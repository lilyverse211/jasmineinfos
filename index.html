<!DOCTYPE html>
<html lang="en">
<head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-PBWZS7P4CT"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jasmineinfos</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #000000;
      color: #e3e5eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
   
    .nav-link {
      color: #f2f2f5 !important;
      font-weight: bold;
      font-size: 0.95rem;
    }
    .nav-link:hover {
      color: #4409f4 !important;
    }
    
    /* Mobile-optimized navbar */
    .navbar {
      background-color: #0f0f0f90 !important;
      backdrop-filter: blur(10px);
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .navbar-brand {
      color: #0a4bf1 !important;
      font-weight: 700;
      font-size: 1.3rem;
    }
    
    .navbar-brand img {
      width: 28px;
      height: 28px;
    }
    
    .navbar-toggler {
      border: none;
      padding: 0.25rem 0.5rem;
    }
    
    .navbar-toggler:focus {
      box-shadow: none;
    }
    
    /* Mobile-first header */
    header {
      text-align: center;
      padding: 60px 15px;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      margin-bottom: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #0a4bf1, #4409f4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    
    header p {
      font-size: clamp(1rem, 4vw, 1.3rem);
      max-width: 600px;
      margin: 0 auto 40px;
      line-height: 1.6;
      opacity: 0.9;
    }
    
    .btn-custom {
      border: 2px solid #0a4bf1;
      color: #0a4bf1;
      background: transparent;
      padding: 15px 30px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      display: inline-block;
      position: relative;
      overflow: hidden;
    }
    
    .btn-custom::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(10, 75, 241, 0.2), transparent);
      transition: left 0.5s;
    }
    
    .btn-custom:hover::before {
      left: 100%;
    }
    
    .btn-custom:hover {
      background: #0a4bf1;
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(10, 75, 241, 0.3);
    }
    
    /* Mobile navigation improvements */
    @media (max-width: 991.98px) {
      .navbar-collapse {
        background: rgba(15, 15, 15, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 10px;
        margin-top: 10px;
        padding: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .navbar-nav {
        text-align: center;
      }
      
      .nav-item {
        margin: 5px 0;
      }
      
      .nav-link {
        padding: 10px 20px !important;
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      
      .nav-link:hover {
        background: rgba(10, 75, 241, 0.1);
      }
    }
    
    /* Small mobile devices */
    @media (max-width: 576px) {
      header {
        padding: 40px 10px;
        min-height: 70vh;
      }
      
      h1 {
        margin-bottom: 15px;
      }
      
      header p {
        margin-bottom: 30px;
        font-size: 1rem;
        padding: 0 10px;
      }
      
      .btn-custom {
        padding: 12px 25px;
        font-size: 1rem;
        width: 200px;
      }
      
      .navbar-brand {
        font-size: 1.2rem;
      }
      
      .navbar-brand img {
        width: 24px;
        height: 24px;
      }
    }
    
    /* Very small devices */
    @media (max-width: 375px) {
      header {
        padding: 30px 5px;
      }
      
      .btn-custom {
        width: 180px;
        padding: 10px 20px;
      }
      
      .container-fluid {
        padding: 0 10px;
      }
    }
    
    /* Landscape orientation on mobile */
    @media (max-height: 500px) and (orientation: landscape) {
      header {
        min-height: 90vh;
        padding: 30px 15px;
      }
      
      h1 {
        font-size: 2.5rem;
      }
      
      header p {
        font-size: 1.1rem;
        margin-bottom: 25px;
      }
    }
    
    /* Touch-friendly improvements */
    .nav-link, .btn-custom {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    
    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
    }
    
    /* Loading animation for better UX */
    .navbar, header {
      animation: fadeInUp 0.6s ease-out;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Improve text readability on mobile */
    @media (max-width: 768px) {
      body {
        line-height: 1.6;
        font-size: 16px; /* Prevents zoom on iOS */
      }
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img
          src="./jasmineinfos.png"
          alt="Jasmineinfos Logo" 
          class="me-2">
        Jasmineinfos
      </a>
      
      <!-- Mobile menu button with custom styling -->
      <button 
        class="navbar-toggler border-0" 
        type="button" 
        data-bs-toggle="collapse" 
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
      </button>
      
      <!-- Navbar links -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="#home" onclick="closeNav()">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./about.html" onclick="closeNav()">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./service.html" onclick="closeNav()">Services</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  
  <!-- Hero Section with mobile optimization -->
  <header id="home" style="padding-top: 100px;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <h1>Welcome to Jasmineinfos</h1>
          <p>Building the future of intelligent systems with cutting-edge AI research and innovation.</p>
          <a href="chat.html" class="btn-custom">Get Started</a>
        </div>
      </div>
    </div>
  </header>
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    // Close mobile navigation when link is clicked
    function closeNav() {
      const navbarCollapse = document.getElementById('navbarNav');
      const bsCollapse = new bootstrap.Collapse(navbarCollapse, {
        toggle: false
      });
      bsCollapse.hide();
    }
    
    // Prevent zoom on double-tap for iOS
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
    
    // Smooth scroll for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });
    
    // Add scroll effect to navbar
    window.addEventListener('scroll', function() {
      const navbar = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        navbar.style.background = 'rgba(15, 15, 15, 0.95)';
      } else {
        navbar.style.background = 'rgba(15, 15, 15, 0.5)';
      }
    });
  </script>
    <footer>
  <a href="sitemap.xml">Sitemap</a>
</footer>

</body>
</html>
