<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <!-- SEO Meta Tags -->
  <title>Eagle AI Chat - Advanced AI Conversation Assistant</title>
  <meta name="description" content="Chat with Eagle AI assistant. Get intelligent responses, image generation, and AI-powered conversations. Advanced mobile-optimized chat interface.">
  <meta name="keywords" content="Eagle AI, AI chat, chatbot, artificial intelligence, image generation, AI assistant, conversation AI, mobile chat">
  <meta name="author" content="Eagle AI">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Eagle AI Chat - Advanced Intelligent Assistant">
  <meta property="og:description" content="Experience intelligent conversations with Eagle AI assistant. Chat, generate images, and get smart responses instantly.">
  <meta property="og:image" content="https://yourwebsite.com/eagle-chat-og-image.jpg">
  <meta property="og:url" content="https://yourwebsite.com/chat.html">
  
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Eagle AI Chat">
  <meta name="twitter:description" content="Chat with our advanced AI assistant on any device.")
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="canonical" href="https://yourwebsite.com/chat.html">

  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    /* Mobile-optimized navbar */
    .navbar {
      background: linear-gradient(135deg, #0A84FF, #0066CC);
      padding: 8px 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 50px;
    }
    
    .navbar-brand {
      font-size: clamp(0.9rem, 4vw, 1.1rem);
      font-weight: 700;
      color: #fff !important;
      margin: 0;
      display: flex;
      align-items: center;
    }
    
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 55px; /* Account for fixed navbar */
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px 10px 10px;
      background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 70%);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }
    
    .chat-messages::before {
      content: '';
      position: fixed;
      top: 55px;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(30, 58, 138, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(14, 165, 233, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    /* Custom scrollbar for webkit browsers */
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .chat-messages::-webkit-scrollbar-thumb {
      background: #0A84FF;
      border-radius: 2px;
    }
    
    .message {
      padding: 14px 18px;
      border-radius: 20px;
      margin-bottom: 12px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.5;
      position: relative;
      animation: messageSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
      backdrop-filter: blur(10px);
    }
    
    /* Responsive image styling inside messages */
    .message img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-top: 8px;
      display: block;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    
    /* Desktop-specific image constraints */
    @media (min-width: 769px) {
      .message {
        max-width: 600px; /* Limit message width on desktop */
      }
      
      .message img {
        max-width: 400px; /* Limit image width on desktop */
        max-height: 400px; /* Limit image height on desktop */
        object-fit: contain; /* Maintain aspect ratio */
      }
      
      .chat-messages {
        padding: 20px 40px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
    }
    
    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(15px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .message.user {
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      color: #fff;
      margin-left: auto;
      text-align: right;
      border-bottom-right-radius: 8px;
      box-shadow: 0 4px 15px rgba(30, 58, 138, 0.3);
    }
    
    .message.bot {
      background: linear-gradient(135deg, rgba(26, 26, 26, 0.9), rgba(42, 42, 42, 0.9));
      border: 1px solid rgba(59, 130, 246, 0.4);
      color: #fff;
      margin-right: auto;
      text-align: left;
      border-bottom-left-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }
    
    .message.bot::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 12px;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      border: 2px solid #000;
      background-image: url('./eagle-logo.png');
      background-size: 16px 16px;
      background-repeat: no-repeat;
      background-position: center;
    }
    
    .message.typing {
      background: rgba(26, 26, 26, 0.9);
      color: #3b82f6;
      font-style: italic;
      border: 1px solid rgba(59, 130, 246, 0.4);
    }
    
    /* Mobile-optimized input area */
    .chat-input {
      background: linear-gradient(180deg, rgba(17, 17, 17, 0.95), rgba(0, 0, 0, 0.98));
      border-top: 1px solid rgba(59, 130, 246, 0.4);
      padding: 12px;
      position: sticky;
      bottom: 0;
      backdrop-filter: blur(20px);
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
    }
    
    /* Desktop input area improvements */
    @media (min-width: 769px) {
      .chat-input {
        padding: 20px 40px;
        max-width: 800px;
        margin: 0 auto;
        border-radius: 25px 25px 0 0;
      }
    }
    
    .upload-section {
      margin-bottom: 8px;
      position: relative;
    }
    
    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }
    
    .file-input-wrapper input[type=file] {
      position: absolute;
      left: -9999px;
    }
    
    .file-upload-btn {
      background: linear-gradient(135deg, rgba(30, 58, 138, 0.2), rgba(59, 130, 246, 0.2));
      border: 2px dashed #3b82f6;
      color: #3b82f6;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      width: 100%;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .file-upload-btn:hover {
      background: linear-gradient(135deg, rgba(30, 58, 138, 0.3), rgba(59, 130, 246, 0.3));
      border-color: #60a5fa;
      transform: translateY(-1px);
    }
    
    .input-group {
      display: flex;
      gap: 8px;
    }
    
    .form-control {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.9), rgba(26, 26, 26, 0.9));
      border: 2px solid rgba(59, 130, 246, 0.5);
      color: #fff;
      border-radius: 25px;
      padding: 14px 18px;
      font-size: 16px;
      flex: 1;
      min-height: 48px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
    }
    
    .form-control:focus {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.95), rgba(26, 26, 26, 0.95));
      color: #fff;
      box-shadow: 0 0 0 0.3rem rgba(59, 130, 246, 0.3);
      border-color: #60a5fa;
      transform: translateY(-1px);
    }
    
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    
    .btn-send {
      background: linear-gradient(135deg, #1e3a8a, #3b82f6, #0ea5e9);
      background-size: 200% 200%;
      animation: buttonGradient 3s ease infinite;
      color: #fff;
      font-weight: 600;
      border: none;
      border-radius: 25px;
      padding: 14px 22px;
      min-width: 75px;
      min-height: 48px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 15px rgba(30, 58, 138, 0.4);
      position: relative;
      overflow: hidden;
    }
    
    .btn-send::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }
    
    .btn-send:hover::before {
      left: 100%;
    }
    
    @keyframes buttonGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .btn-send:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30, 58, 138, 0.5);
    }
    
    .btn-send:active {
      transform: translateY(0);
    }
    
    .btn-send:disabled {
      background: linear-gradient(135deg, #333, #444);
      color: #666;
      transform: none;
      animation: none;
      box-shadow: none;
    }
    
    /* Mobile-specific improvements */
    @media (max-width: 768px) {
      .message {
        max-width: 90%;
        font-size: 0.95rem;
      }
      
      .message img {
        max-width: 100%;
        max-height: 300px; /* Limit height on mobile */
      }
      
      .chat-messages {
        padding: 10px 8px;
      }
      
      .chat-input {
        padding: 8px;
      }
      
      .form-control {
        font-size: 16px !important; /* Prevent zoom on focus */
      }
      
      .btn-send {
        min-width: 60px;
        padding: 12px 16px;
      }
      
      .logo-img {
        width: 28px;
        height: 28px;
        margin-right: 8px;
      }
    }
    
    /* Small mobile devices */
    @media (max-width: 480px) {
      .navbar-brand {
        font-size: 0.9rem;
      }
      
      .logo-img {
        width: 24px;
        height: 24px;
        margin-right: 6px;
      }
      
      .message {
        max-width: 95%;
        padding: 10px 12px;
        font-size: 0.9rem;
      }
      
      .message img {
        max-height: 250px; /* Even smaller on very small screens */
      }
      
      .input-group {
        gap: 6px;
      }
      
      .form-control {
        padding: 10px 14px;
      }
      
      .btn-send {
        min-width: 55px;
        padding: 10px 14px;
        font-size: 0.9rem;
      }
    }
    
    /* Landscape orientation on mobile */
    @media (max-height: 500px) and (orientation: landscape) {
      .chat-messages {
        padding: 8px;
      }
      
      .message {
        margin-bottom: 6px;
        padding: 8px 12px;
      }
      
      .message img {
        max-height: 200px; /* Smaller images in landscape */
      }
      
      .chat-input {
        padding: 6px;
      }
    }
    
    /* Loading indicator */
    .typing-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #0A84FF;
      animation: typing 1.4s infinite ease-in-out;
      margin-right: 4px;
    }
    
    .typing-indicator:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typing {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    
    /* Improve touch interactions */
    .btn, .form-control, .file-upload-btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    
    /* Safe area for iPhone notch */
    @supports (padding: max(0px)) {
      .chat-container {
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
      }
      
      .chat-input {
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }
    }
    
    /* Image hover effects for desktop */
    @media (min-width: 769px) {
      .message img {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
      }
      
      .message img:hover {
        transform: scale(1.02);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      }
    }
  </style>
</head>
<body>

<div class="container-fluid chat-container">
  <!-- Mobile-optimized navbar -->
  <nav class="navbar">
    <div class="d-flex align-items-center w-100">
      <span class="navbar-brand">
        <img src="./eagle.png" alt="Eagle AI Logo" class="logo-img">
        Eagle AI
        <span style="font-size: 0.7rem; font-weight: 400; margin-left: 8px; opacity: 0.8;">Advanced Intelligence</span>
      </span>
    </div>
  </nav>

  <!-- Chat Messages with mobile optimization -->
  <div class="chat-messages" id="chatMessages">
    <!-- Initial messages will be added via JavaScript after API integration -->
  </div>

  <!-- Mobile-optimized input area -->
  <div class="chat-input">
    <!-- Image upload section -->
    <div class="upload-section" id="uploadSection">
      <div class="file-input-wrapper">
        <input type="file" id="imageUpload" accept="image/*">
        <label for="imageUpload" class="file-upload-btn">
          📷 Tap to upload image
        </label>
      </div>
    </div>
    
    <!-- Text input with send button -->
    <div class="input-group">
      <input 
        type="text" 
        id="userInput" 
        class="form-control" 
        placeholder="Type your message..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="sentences"
        spellcheck="true">
      <button class="btn btn-send" id="sendBtn">
        <span id="sendText">Send</span>
      </button>
    </div>
  </div>
</div>

<script>
  const sendBtn = document.getElementById("sendBtn");
  const sendText = document.getElementById("sendText");
  const userInput = document.getElementById("userInput");
  const chatMessages = document.getElementById("chatMessages");
  const imageUpload = document.getElementById("imageUpload");
  const preview = document.getElementById("preview");
  const previewContainer = document.getElementById("previewContainer");
  const uploadSection = document.getElementById("uploadSection");

  // Keywords to detect image generation requests
  const imageKeywords = ["draw", "image", "picture", "photo", "generate", "create", "illustration", "design", "sketch", "artwork"];

  function addMessage(text, sender, isHtml = false) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    
    if (isHtml) {
      msg.innerHTML = text;
    } else {
      msg.textContent = text;
    }
    
    chatMessages.appendChild(msg);
    
    // Smooth scroll to bottom with mobile optimization
    setTimeout(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }, 50);
  }

  function addTypingIndicator() {
    const typingMsg = document.createElement("div");
    typingMsg.classList.add("message", "bot", "typing");
    typingMsg.id = "typingIndicator";
    typingMsg.innerHTML = `
      <span class="typing-indicator"></span>
      <span class="typing-indicator"></span>
      <span class="typing-indicator"></span>
    `;
    chatMessages.appendChild(typingMsg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function removeTypingIndicator() {
    const typing = document.getElementById("typingIndicator");
    if (typing) typing.remove();
  }

  function setButtonLoading(loading) {
    sendBtn.disabled = loading;
    if (loading) {
      sendText.textContent = "...";
      addTypingIndicator();
    } else {
      sendText.textContent = "Send";
      removeTypingIndicator();
    }
  }

  // Handle image upload without preview
  imageUpload.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) {
      // Check file size (max 5MB for mobile)
      if (file.size > 5 * 1024 * 1024) {
        alert("Image too large. Please choose an image under 5MB.");
        imageUpload.value = "";
        return;
      }
      
      // Haptic feedback on supported devices
      if (navigator.vibrate) {
        navigator.vibrate(50);
      }
      
      // Optional: Show file name in upload button
      const fileName = file.name.length > 20 ? file.name.substring(0, 20) + "..." : file.name;
      document.querySelector('.file-upload-btn').textContent = `📷 ${fileName}`;
    }
  });

  function removeImage() {
    imageUpload.value = "";
    document.querySelector('.file-upload-btn').textContent = "📷 Tap to upload image";
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    const hasImage = imageUpload.files.length > 0;

    if (!text && !hasImage) return;

    // Show user message
    if (text) addMessage(text, "user");
    if (hasImage) {
      addMessage("Image uploaded", "user");
      removeImage();
    }

    userInput.value = "";
    setButtonLoading(true);

    try {
      // API Integration Ready
      if (hasImage) {
        // Call your image analysis API
        const response = await callImageAPI(text, imageUpload.files[0]);
        addMessage(response, "bot");
      } else {
        const isImageRequest = imageKeywords.some(word => text.toLowerCase().includes(word));
        if (isImageRequest) {
          // Call your image generation API
          const response = await callImageGenerationAPI(text);
          addMessage(response, "bot", true); // Allow HTML for image display
        } else {
          // Call your text chat API
          const response = await callChatAPI(text);
          addMessage(response, "bot");
        }
      }
    } catch (error) {
      addMessage("Sorry, I'm having trouble connecting right now. Please try again.", "bot");
      console.error("API Error:", error);
    }

    setButtonLoading(false);
    
    // Haptic feedback on completion
    if (navigator.vibrate) {
      navigator.vibrate([50, 50, 50]);
    }
  }

  // API Integration Functions - Replace with your actual API calls
  async function callChatAPI(message) {
    // Replace with your actual API endpoint
    const API_URL = "YOUR_CHAT_API_ENDPOINT";
    const API_KEY = "YOUR_API_KEY";
    
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        message: message,
        model: "your-model",
        max_tokens: 150
      })
    });
    
    const data = await response.json();
    return data.response || "I received your message but couldn't generate a response.";
  }

  async function callImageAPI(text, imageFile) {
    // Replace with your actual image analysis API
    const API_URL = "YOUR_IMAGE_API_ENDPOINT";
    const API_KEY = "YOUR_API_KEY";
    
    const formData = new FormData();
    formData.append("image", imageFile);
    formData.append("prompt", text || "Analyze this image");
    
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${API_KEY}`
      },
      body: formData
    });
    
    const data = await response.json();
    return data.analysis || "I can see your image but couldn't analyze it right now.";
  }

  async function callImageGenerationAPI(prompt) {
    // Replace with your actual image generation API
    const API_URL = "YOUR_IMAGE_GEN_API_ENDPOINT";
    const API_KEY = "YOUR_API_KEY";
    
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        prompt: prompt,
        size: "512x512",
        quality: "standard"
      })
    });
    
    const data = await response.json();
    
    if (data.image_url) {
      return `<div>Here's your generated image:</div><img src="${data.image_url}" alt="Generated image">`;
    }
    
    return "I couldn't generate an image right now. Please try again.";
  }

  // Event listeners with mobile optimization
  sendBtn.addEventListener("click", sendMessage);

  userInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Mobile keyboard handling
  userInput.addEventListener("focus
